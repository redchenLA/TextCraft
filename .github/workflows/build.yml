name: Build iOS App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
      
      - name: Create Xcode Project
        run: |
          # Create the Xcode project structure
          mkdir -p TextCraft.xcodeproj
          cat > project.yml << 'YAML'
          name: TextCraft
          options:
            bundleIdPrefix: com.textcraft
            deploymentTarget:
              iOS: "16.0"
          targets:
            TextCraft:
              type: application
              platform: iOS
              sources:
                - TextCraft
              settings:
                base:
                  PRODUCT_BUNDLE_IDENTIFIER: com.textcraft.app
                  MARKETING_VERSION: "1.0.0"
                  CURRENT_PROJECT_VERSION: "1"
                  DEVELOPMENT_TEAM: "${{ secrets.DEVELOPMENT_TEAM_ID }}"
                  CODE_SIGN_IDENTITY: "Apple Distribution"
                  CODE_SIGN_STYLE: Manual
                  INFOPLIST_FILE: TextCraft/Info.plist
                  TARGETED_DEVICE_FAMILY: "1"
                  SWIFT_VERSION: "5.0"
          YAML
          
          # Generate Xcode project using xcodegen if available, or create manually
          if command -v xcodegen &> /dev/null; then
            xcodegen generate
          else
            echo "xcodegen not found, will create project manually"
          fi
      
      - name: Create Info.plist
        run: |
          cat > TextCraft/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>zh_CN</string>
              <key>CFBundleDisplayName</key>
              <string>TextCraft</string>
              <key>CFBundleExecutable</key>
              <string>$(EXECUTABLE_NAME)</string>
              <key>CFBundleIdentifier</key>
              <string>$(PRODUCT_BUNDLE_IDENTIFIER)</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>$(PRODUCT_NAME)</string>
              <key>CFBundlePackageType</key>
              <string>$(PRODUCT_BUNDLE_PACKAGE_TYPE)</string>
              <key>CFBundleShortVersionString</key>
              <string>$(MARKETING_VERSION)</string>
              <key>CFBundleVersion</key>
              <string>$(CURRENT_PROJECT_VERSION)</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>UIApplicationSceneManifest</key>
              <dict>
                  <key>UIApplicationSupportsMultipleScenes</key>
                  <false/>
              </dict>
              <key>UILaunchScreen</key>
              <dict/>
              <key>UIRequiredDeviceCapabilities</key>
              <array>
                  <string>armv7</string>
              </array>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
              </array>
          </dict>
          </plist>
          PLIST
      
      - name: Install xcodegen
        run: brew install xcodegen
      
      - name: Generate Xcode Project
        run: |
          cat > project.yml << 'YAML'
          name: TextCraft
          options:
            bundleIdPrefix: com.textcraft
          targets:
            TextCraft:
              type: application
              platform: iOS
              deploymentTarget: "16.0"
              sources:
                - path: TextCraft
                  excludes:
                    - "**/*.xcassets/**/*.png"
              settings:
                base:
                  PRODUCT_BUNDLE_IDENTIFIER: com.textcraft.app
                  MARKETING_VERSION: "1.0.0"
                  CURRENT_PROJECT_VERSION: "1"
                  DEVELOPMENT_TEAM: "${{ secrets.DEVELOPMENT_TEAM_ID }}"
                  CODE_SIGN_IDENTITY: "Apple Distribution"
                  CODE_SIGN_STYLE: Manual
                  INFOPLIST_FILE: TextCraft/Info.plist
                  TARGETED_DEVICE_FAMILY: "1"
                  SWIFT_VERSION: "5.0"
                  ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
                configs:
                  release:
                    CODE_SIGN_IDENTITY: "Apple Distribution"
                    PROVISIONING_PROFILE_SPECIFIER: ""
          YAML
          xcodegen generate
      
      - name: Create Assets.xcassets
        run: |
          mkdir -p TextCraft/Assets.xcassets/AppIcon.appiconset
          cat > TextCraft/Assets.xcassets/Contents.json << 'JSON'
          {
            "info" : {
              "author" : "xcode",
              "version" : 1
            }
          }
          JSON
          cat > TextCraft/Assets.xcassets/AppIcon.appiconset/Contents.json << 'JSON'
          {
            "images" : [
              {
                "idiom" : "universal",
                "platform" : "ios",
                "size" : "1024x1024"
              }
            ],
            "info" : {
              "author" : "xcode",
              "version" : 1
            }
          }
          JSON
      
      - name: Build Archive
        run: |
          xcodebuild archive \
            -project TextCraft.xcodeproj \
            -scheme TextCraft \
            -configuration Release \
            -archivePath build/TextCraft.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            | xcpretty
      
      - name: Export IPA
        run: |
          mkdir -p build/Payload
          cp -r build/TextCraft.xcarchive/Products/Applications/*.app build/Payload/
          cd build && zip -r TextCraft.ipa Payload
      
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TextCraft-IPA
          path: build/TextCraft.ipa
          retention-days: 30
